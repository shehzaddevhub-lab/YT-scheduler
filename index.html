<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Dash</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="min-h-screen bg-gray-950 text-gray-100 p-3 md:p-6 select-none">

    <!-- SETUP / ID ENTRY MODAL -->
    <div id="idModal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl max-w-sm w-full text-center space-y-4 shadow-2xl">
            <h3 class="text-lg font-bold text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500">Connect to Sync ID</h3>
            <p class="text-xs text-gray-400">Enter a shared ID or create a new one to sync your dashboard instantly on any device.</p>
            <input type="text" id="idCodeInput" placeholder="e.g., tech_master_2026" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 text-xs text-white text-center focus:outline-none focus:border-red-500 transition font-mono font-bold">
            <button onclick="submitIdCode()" class="w-full bg-gradient-to-r from-red-600 to-orange-600 p-3 text-xs font-bold rounded-xl text-white cursor-pointer shadow-lg active:scale-95 transition">Open Dashboard</button>
        </div>
    </div>

    <!-- Header Section -->
    <header class="max-w-7xl mx-auto flex justify-between items-center border-b border-gray-800 pb-4 mb-6">
        
        <!-- LEFT TOP: INSTALL APP BUTTON (Only shows when direct browser prompt is ready) -->
        <div class="flex items-center gap-2">
            <button id="installAppBtn" class="hidden flex items-center gap-1.5 bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 px-3 py-2 rounded-xl text-[10px] md:text-xs font-bold text-white shadow-lg transition cursor-pointer">
                <span>📱</span> Install App
            </button>
        </div>
        
        <!-- TOP RIGHT: ACTIVE ID BADGE -->
        <div>
            <span id="syncBadge" class="text-xs bg-red-950/40 border border-red-900 px-3 py-1.5 rounded-full text-red-400 flex items-center gap-1.5 font-medium">
                <span class="w-2 h-2 rounded-full bg-red-500" id="statusDot"></span> 
                <span id="syncText">No Active ID</span>
            </span>
        </div>
    </header>

    <!-- Main 3-Section Layout Grid -->
    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
        
        <!-- SECTION 1: VIDEO ADD -->
        <div class="space-y-6">
            <section class="bg-gray-900 p-5 rounded-2xl border border-gray-800 shadow-xl">
                <h2 class="text-base font-bold mb-4 text-yellow-400 flex items-center gap-2 border-b border-gray-800 pb-2">
                    <span>🎬</span> Add New Video
                </h2>
                <form id="videoForm" class="space-y-4">
                    <input type="text" id="videoTitle" placeholder="Video Title..." class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 text-xs text-white focus:outline-none focus:border-red-500 transition" required />
                    <select id="videoChannel" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 text-xs text-white focus:outline-none cursor-pointer">
                        <option value="Tech IT Master">Tech IT Master</option>
                        <option value="Burhan Telecom">Burhan Telecom</option>
                    </select>
                    <input type="url" id="videoLink" placeholder="YouTube Video Link..." class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 text-xs text-white focus:outline-none focus:border-red-500 transition" oninput="previewVideo(this.value)" required />
                    <div id="formVideoPreview" class="hidden w-full aspect-video rounded-xl overflow-hidden bg-black border border-gray-800"></div>
                    <button type="submit" class="w-full bg-gradient-to-r from-red-600 to-orange-600 text-white font-semibold p-3 text-xs rounded-xl shadow-lg cursor-pointer transition active:scale-95">Add to Schedule</button>
                </form>
            </section>
        </div>

        <!-- SECTION 2: PENDING -->
        <section class="bg-gray-900 p-5 rounded-2xl border border-gray-800 shadow-xl lg:min-h-[500px]">
            <h2 class="text-base font-bold mb-4 text-orange-400 flex items-center justify-between border-b border-gray-800 pb-2">
                <span class="flex items-center gap-2">⏳ Pending</span>
                <span id="pendingCount" class="text-xs bg-orange-500/10 text-orange-400 px-2 py-0.5 rounded-full border border-orange-500/20">0</span>
            </h2>
            <div id="pendingList" class="space-y-4">
                <div class="text-center py-12 text-gray-600 text-xs border border-dashed border-gray-800 rounded-xl">No pending videos.</div>
            </div>
        </section>

        <!-- SECTION 3: CLEARED -->
        <section class="bg-gray-900 p-5 rounded-2xl border border-gray-800 shadow-xl lg:min-h-[500px]">
            <h2 class="text-base font-bold mb-4 text-green-400 flex items-center justify-between border-b border-gray-800 pb-2">
                <span class="flex items-center gap-2">✅ Cleared</span>
                <span id="clearCount" class="text-xs bg-green-500/10 text-green-400 px-2 py-0.5 rounded-full border border-green-500/20">0</span>
            </h2>
            <div id="clearList" class="space-y-4">
                <div class="text-center py-12 text-gray-600 text-xs border border-dashed border-gray-800 rounded-xl">No cleared videos.</div>
            </div>
        </section>
    </main>

    <!-- App Engine Logic -->
    <script>
        // 1. PWA CONFIG (ADD TO HOME SCREEN DIRECT ENGINE)
        const manifestStr = JSON.stringify({
            name: "Video Schedule Dash",
            short_name: "Video Dash",
            display: "standalone",
            background_color: "#030712",
            theme_color: "#dc2626",
            icons: [{ src: "https://cdn-icons-png.flaticon.com/512/1384/1384060.png", sizes: "512x512", type: "image/png" }]
        });
        const blob = new Blob([manifestStr], {type: 'application/json'});
        const manifestUrl = URL.createObjectURL(blob);
        document.querySelector('head').insertAdjacentHTML('beforeend', `<link rel="manifest" href="${manifestUrl}">`);
        const swBlob = new Blob(["self.addEventListener('fetch', function() {});"], {type: 'application/javascript'});
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register(URL.createObjectURL(swBlob)); }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); 
            deferredPrompt = e;
            // بٹن صرف تب ہی ظاہر ہوگا جب براؤزر ڈائریکٹ انسٹال ونڈو کے لیے ریڈی ہوگا
            document.getElementById('installAppBtn').classList.remove('hidden');
        });
        
        document.getElementById('installAppBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('installAppBtn').classList.add('hidden');
                }
                deferredPrompt = null;
            }
        });

        // 2. FIREBASE & INSTANT LOCAL-FALLBACK ENGINE
        const firebaseConfig = { databaseURL: "https://tech-master-live-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let activeIdCode = null;
        let dbSyncRef = null;
        let allVideosGlobal = JSON.parse(localStorage.getItem('backup_videos_local')) || [];

        const pendingList = document.getElementById('pendingList');
        const clearList = document.getElementById('clearList');
        const formVideoPreview = document.getElementById('formVideoPreview');

        function checkUrlForId() {
            const params = new URLSearchParams(window.location.search);
            const idParam = params.get('id');
            
            if (idParam) {
                activeIdCode = idParam.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');
                connectToId();
            } else {
                document.getElementById('idModal').classList.remove('hidden');
                renderVideos(); // کیشے ڈیٹا فرسٹ شو
            }
        }

        function submitIdCode() {
            const codeInput = document.getElementById('idCodeInput').value.trim();
            if (!codeInput) return alert("Please enter a valid ID!");
            
            activeIdCode = codeInput.toLowerCase().replace(/[^a-z0-9_-]/g, '');
            const newUrl = window.location.origin + window.location.pathname + "?id=" + activeIdCode;
            window.history.pushState({}, '', newUrl);
            
            document.getElementById('idModal').classList.add('hidden');
            connectToId();
        }

        function connectToId() {
            if (!activeIdCode) return;
            
            document.getElementById('syncBadge').className = "text-xs bg-green-950/40 border border-green-800 px-3 py-1.5 rounded-full text-green-400 flex items-center gap-1.5 font-medium";
            document.getElementById('statusDot').className = "w-2 h-2 rounded-full bg-green-400 animate-pulse";
            document.getElementById('syncText').innerText = "ID: " + activeIdCode;

            if (dbSyncRef) dbSyncRef.off();
            
            dbSyncRef = database.ref('universal_rooms/' + activeIdCode);
            dbSyncRef.on('value', (snapshot) => {
                const data = snapshot.val();
                let videosArray = [];
                if (data) {
                    Object.keys(data).forEach(key => {
                        videosArray.push({ id: key, ...data[key] });
                    });
                }
                videosArray.reverse();
                allVideosGlobal = videosArray;
                localStorage.setItem('backup_videos_local', JSON.stringify(allVideosGlobal));
                renderVideos();
            });
        }

        // 3. YOUTUBE EXTRACTOR ENGINE
        function getYouTubeId(url) {
            if (!url) return null;
            let match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=|shorts\/))([\w-]{11})/);
            return (match && match[1]) ? match[1] : null;
        }

        function buildEmbedCode(videoId) {
            return `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>`;
        }

        function previewVideo(url) {
            const videoId = getYouTubeId(url);
            if (videoId) {
                formVideoPreview.innerHTML = buildEmbedCode(videoId);
                formVideoPreview.classList.remove('hidden');
            } else {
                formVideoPreview.innerHTML = '';
                formVideoPreview.classList.add('hidden');
            }
        }

        function renderVideos() {
            const pendingVideos = allVideosGlobal.filter(v => v.status === 'Pending' || v.status === 'SEO In Progress');
            const clearVideos = allVideosGlobal.filter(v => v.status === 'Scheduled' || v.status === 'Public');

            document.getElementById('pendingCount').innerText = pendingVideos.length;
            document.getElementById('clearCount').innerText = clearVideos.length;

            if (pendingVideos.length === 0) {
                pendingList.innerHTML = `<div class="text-center py-12 text-gray-600 text-xs border border-dashed border-gray-800 rounded-xl">No pending videos.</div>`;
            } else {
                pendingList.innerHTML = pendingVideos.map(video => createCardHTML(video)).join('');
            }

            if (clearVideos.length === 0) {
                clearList.innerHTML = `<div class="text-center py-12 text-gray-600 text-xs border border-dashed border-gray-800 rounded-xl">No cleared videos.</div>`;
            } else {
                clearList.innerHTML = clearVideos.map(video => createCardHTML(video)).join('');
            }
        }

        function createCardHTML(video) {
            let statusClass = video.status === 'Pending' ? 'bg-amber-500/10 text-amber-400 border-amber-500/20' : 
                              video.status === 'SEO In Progress' ? 'bg-purple-500/10 text-purple-400 border-purple-500/20' : 
                              video.status === 'Scheduled' ? 'bg-teal-500/10 text-teal-400 border-teal-500/20' : 'bg-green-500/10 text-green-400 border-green-500/20';
            
            let btnText = video.status === 'Pending' ? 'Start SEO' : 
                          video.status === 'SEO In Progress' ? 'Set Schedule' : 
                          video.status === 'Scheduled' ? 'Mark Public' : 'Back to Pending';

            const channelClass = video.channel === 'Tech IT Master' ? 'bg-orange-600/20 text-orange-400' : 'bg-blue-600/20 text-blue-400';
            const timeHTML = video.schedule_time ? `<p class="text-[11px] text-teal-400 font-medium mt-1">📅 ${video.schedule_time}</p>` : '';
            const videoId = getYouTubeId(video.link);
            const embedHTML = videoId ? `<div class="w-full aspect-video rounded-lg overflow-hidden bg-black mt-2 mb-2 border border-gray-800">${buildEmbedCode(videoId)}</div>` : '';

            return `
                <div class="bg-gray-900 border border-gray-800 p-4 rounded-xl flex flex-col gap-2 shadow-md">
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-[10px] font-bold px-2 py-0.5 rounded ${channelClass}">${video.channel}</span>
                        <span class="text-[10px] px-2 py-0.5 rounded-full border ${statusClass} font-medium">${video.status}</span>
                    </div>
                    <h3 class="text-xs font-semibold text-gray-200">${video.title}</h3>
                    ${timeHTML}
                    ${embedHTML}
                    
                    <div class="flex items-center justify-between border-t border-gray-800 pt-2 mt-2">
                        <div id="del-box-${video.id}" class="hidden flex items-center gap-1.5">
                            <span class="text-[10px] text-gray-400">Delete?</span>
                            <button onclick="confirmDelete('${video.id}', true)" class="px-2 py-1 bg-red-600 text-[10px] text-white rounded cursor-pointer">Yes</button>
                            <button onclick="confirmDelete('${video.id}', false)" class="px-2 py-1 bg-gray-800 text-[10px] text-gray-400 rounded border border-gray-700 cursor-pointer">No</button>
                        </div>
                        <button id="del-btn-${video.id}" onclick="showDeletePrompt('${video.id}')" class="text-[11px] text-red-500 hover:text-red-400 font-medium cursor-pointer">🗑 Delete</button>
                        
                        <button onclick="updateStatus('${video.id}', '${video.status}')" class="text-[11px] px-3 py-1.5 rounded-lg bg-gray-800 border border-gray-700 hover:bg-gray-700 text-gray-200 transition font-medium cursor-pointer">
                            ${btnText}
                        </button>
                    </div>
                </div>
            `;
        }

        // 4. INSTANT LOCAL ADD ACTION (FIXED)
        document.getElementById('videoForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const title = document.getElementById('videoTitle').value.trim();
            const channel = document.getElementById('videoChannel').value;
            const link = document.getElementById('videoLink').value.trim();
            const generatedId = 'vid_' + Date.now();

            const tempVideoObj = { id: generatedId, title, channel, link, status: 'Pending', schedule_time: '' };

            // 🟢 جادو: کلاؤڈ کا انتظار کیے بغیر سکرین پر فوری شو کریں
            allVideosGlobal.unshift(tempVideoObj);
            localStorage.setItem('backup_videos_local', JSON.stringify(allVideosGlobal));
            renderVideos();

            // فارم ری سیٹ
            document.getElementById('videoForm').reset();
            formVideoPreview.classList.add('hidden');
            formVideoPreview.innerHTML = '';

            // بیک گراؤنڈ میں کلاؤڈ سنک کرنا
            if(activeIdCode && dbSyncRef) {
                dbSyncRef.child(generatedId).set({ title, channel, link, status: 'Pending', schedule_time: '' }).catch(err => {
                    console.log("Cloud delay, saved locally.");
                });
            }
        });

        function updateStatus(id, currentStatus) {
            let nextStatus = 'Pending';
            let timePrompt = null;

            if (currentStatus === 'Pending') nextStatus = 'SEO In Progress';
            else if (currentStatus === 'SEO In Progress') {
                timePrompt = prompt("Enter Schedule (e.g. 17 June 6pm):");
                if (timePrompt === null) return;
                if (!timePrompt.trim()) timePrompt = "Not set";
                nextStatus = 'Scheduled';
            } else if (currentStatus === 'Scheduled') nextStatus = 'Public';
            else nextStatus = 'Pending';

            // لوکل فوری اپڈیٹ
            allVideosGlobal = allVideosGlobal.map(v => {
                if(v.id === id) {
                    v.status = nextStatus;
                    if(timePrompt !== null) v.schedule_time = timePrompt;
                    if(nextStatus === 'Pending') v.schedule_time = '';
                }
                return v;
            });
            localStorage.setItem('backup_videos_local', JSON.stringify(allVideosGlobal));
            renderVideos();

            // کلاؤڈ اپڈیٹ
            if(activeIdCode && dbSyncRef) {
                const updates = { status: nextStatus };
                if (timePrompt !== null) updates.schedule_time = timePrompt;
                if (nextStatus === 'Pending') updates.schedule_time = '';
                dbSyncRef.child(id).update(updates);
            }
        }

        function showDeletePrompt(id) {
            document.getElementById(`del-btn-${id}`).classList.add('hidden');
            document.getElementById(`del-box-${id}`).classList.remove('hidden');
        }

        function confirmDelete(id, confirm) {
            if(confirm) {
                allVideosGlobal = allVideosGlobal.filter(v => v.id !== id);
                localStorage.setItem('backup_videos_local', JSON.stringify(allVideosGlobal));
                renderVideos();

                if(activeIdCode && dbSyncRef) {
                    dbSyncRef.child(id).remove();
                }
            } else {
                document.getElementById(`del-btn-${id}`).classList.remove('hidden');
                document.getElementById(`del-box-${id}`).classList.add('hidden');
            }
        }

        // انجن سٹارٹ کریں
        checkUrlForId();
    </script>
</body>
</html>
