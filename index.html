<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YT Schedule</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MQTT Websocket Library (For 100% Guaranteed Instant Live Sync) -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        /* Custom Scrollbar for hidden elements */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        /* Calendar Icon Color Fix */
        ::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    </style>
</head>
<body class="min-h-screen bg-gray-950 text-gray-100 p-3 md:p-6 select-none relative">

    <!-- 1. SETUP / ID ENTRY MODAL -->
    <div id="idModal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl max-w-sm w-full text-center space-y-4 shadow-2xl">
            <h3 class="text-lg font-bold text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500">Connect to Sync ID</h3>
            <p class="text-xs text-gray-400">Enter a shared ID or create a new one to sync your dashboard instantly on any device.</p>
            <input type="text" id="idCodeInput" placeholder="e.g., tech_master_2026" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 text-xs text-white text-center focus:outline-none focus:border-red-500 transition font-mono font-bold">
            <button onclick="submitIdCode()" class="w-full bg-gradient-to-r from-red-600 to-orange-600 p-3 text-xs font-bold rounded-xl text-white cursor-pointer shadow-lg active:scale-95 transition">Open Dashboard</button>
        </div>
    </div>

    <!-- 2. NATIVE DATE & TIME PICKER MODAL -->
    <div id="scheduleModal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl max-w-sm w-full space-y-5 shadow-2xl">
            <h3 class="text-lg font-bold text-teal-400 flex items-center gap-2"><span>📅</span> Set Date & Time</h3>
            
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-gray-400 mb-1 font-medium">Select Date</label>
                    <input type="date" id="scheduleDate" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 text-xs text-white focus:outline-none focus:border-teal-500 transition cursor-pointer">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1 font-medium">Select Time</label>
                    <input type="time" id="scheduleTime" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 text-xs text-white focus:outline-none focus:border-teal-500 transition cursor-pointer">
                </div>
            </div>

            <div class="flex items-center gap-3 pt-2">
                <button onclick="closeScheduleModal()" class="flex-1 bg-gray-800 hover:bg-gray-700 text-gray-300 p-2.5 text-xs font-bold rounded-xl transition cursor-pointer border border-gray-700">Cancel</button>
                <button onclick="saveSchedule()" class="flex-1 bg-teal-600 hover:bg-teal-500 text-white p-2.5 text-xs font-bold rounded-xl transition cursor-pointer shadow-lg shadow-teal-900/50">Save Schedule</button>
            </div>
        </div>
    </div>

    <!-- Header Section -->
    <header class="max-w-7xl mx-auto flex justify-between items-center border-b border-gray-800 pb-4 mb-6">
        <div class="flex items-center gap-2">
            <button id="installAppBtn" class="hidden flex items-center gap-1.5 bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 px-3 py-2 rounded-xl text-[10px] md:text-xs font-bold text-white shadow-lg transition cursor-pointer">
                <span>📱</span> Install App
            </button>
        </div>
        <div>
            <span id="syncBadge" class="text-xs bg-red-950/40 border border-red-900 px-3 py-1.5 rounded-full text-red-400 flex items-center gap-1.5 font-medium">
                <span class="w-2 h-2 rounded-full bg-red-500" id="statusDot"></span> 
                <span id="syncText">Connecting...</span>
            </span>
        </div>
    </header>

    <!-- Main 3-Section Layout Grid -->
    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
        
        <!-- SECTION 1: VIDEO ADD -->
        <div class="space-y-6">
            <section class="bg-gray-900 p-5 rounded-2xl border border-gray-800 shadow-xl">
                <h2 class="text-base font-bold mb-4 text-yellow-400 flex items-center gap-2 border-b border-gray-800 pb-2">
                    <span>🎬</span> Add New Video
                </h2>
                <form id="videoForm" class="space-y-4" onsubmit="handleFormSubmit(event)">
                    <input type="text" id="videoTitle" placeholder="Video Title..." class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 text-xs text-white focus:outline-none focus:border-red-500 transition" required />
                    <select id="videoChannel" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 text-xs text-white focus:outline-none cursor-pointer">
                        <option value="Tech IT Master">Tech IT Master</option>
                        <option value="Burhan Telecom">Burhan Telecom</option>
                    </select>
                    <input type="url" id="videoLink" placeholder="YouTube Video Link..." class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 text-xs text-white focus:outline-none focus:border-red-500 transition" oninput="previewVideo(this.value)" required />
                    <div id="formVideoPreview" class="hidden w-full aspect-video rounded-xl overflow-hidden bg-black border border-gray-800"></div>
                    <button type="submit" id="addBtnSubmit" class="w-full bg-gradient-to-r from-red-600 to-orange-600 text-white font-semibold p-3 text-xs rounded-xl shadow-lg cursor-pointer transition active:scale-95">Add to Schedule</button>
                </form>
            </section>
        </div>

        <!-- SECTION 2: PENDING -->
        <section class="bg-gray-900 p-5 rounded-2xl border border-gray-800 shadow-xl lg:min-h-[500px] flex flex-col">
            <div class="flex items-center justify-between border-b border-gray-800 pb-2 mb-3">
                <h2 class="text-base font-bold text-orange-400 flex items-center gap-2"><span>⏳</span> Pending</h2>
                <span id="pendingCount" class="text-[10px] bg-orange-500/10 text-orange-400 px-2 py-0.5 rounded-full border border-orange-500/20 font-bold">0</span>
            </div>
            
            <!-- Channel Filter Tabs -->
            <div class="flex bg-gray-950 rounded-xl p-1 mb-4 text-[10px] font-medium border border-gray-800">
                <button onclick="setFilter('pending', 'All')" id="p-All" class="flex-1 py-1.5 rounded-lg bg-orange-600/20 text-orange-400 transition">All</button>
                <button onclick="setFilter('pending', 'Tech IT Master')" id="p-Tech IT Master" class="flex-1 py-1.5 rounded-lg text-gray-500 hover:text-gray-300 transition">Tech IT</button>
                <button onclick="setFilter('pending', 'Burhan Telecom')" id="p-Burhan Telecom" class="flex-1 py-1.5 rounded-lg text-gray-500 hover:text-gray-300 transition">Burhan</button>
            </div>

            <div id="pendingList" class="space-y-4 flex-1">
                <div class="text-center py-12 text-gray-600 text-xs border border-dashed border-gray-800 rounded-xl">No pending videos.</div>
            </div>
        </section>

        <!-- SECTION 3: CLEARED -->
        <section class="bg-gray-900 p-5 rounded-2xl border border-gray-800 shadow-xl lg:min-h-[500px] flex flex-col">
            <div class="flex items-center justify-between border-b border-gray-800 pb-2 mb-3">
                <h2 class="text-base font-bold text-green-400 flex items-center gap-2"><span>✅</span> Cleared</h2>
                <span id="clearCount" class="text-[10px] bg-green-500/10 text-green-400 px-2 py-0.5 rounded-full border border-green-500/20 font-bold">0</span>
            </div>

            <!-- Channel Filter Tabs -->
            <div class="flex bg-gray-950 rounded-xl p-1 mb-4 text-[10px] font-medium border border-gray-800">
                <button onclick="setFilter('cleared', 'All')" id="c-All" class="flex-1 py-1.5 rounded-lg bg-green-600/20 text-green-400 transition">All</button>
                <button onclick="setFilter('cleared', 'Tech IT Master')" id="c-Tech IT Master" class="flex-1 py-1.5 rounded-lg text-gray-500 hover:text-gray-300 transition">Tech IT</button>
                <button onclick="setFilter('cleared', 'Burhan Telecom')" id="c-Burhan Telecom" class="flex-1 py-1.5 rounded-lg text-gray-500 hover:text-gray-300 transition">Burhan</button>
            </div>

            <div id="clearList" class="space-y-4 flex-1">
                <div class="text-center py-12 text-gray-600 text-xs border border-dashed border-gray-800 rounded-xl">No cleared videos.</div>
            </div>
        </section>
    </main>

    <!-- PWA & Sync Engine Script -->
    <script>
        // 1. PWA INSTALLER
        const manifestStr = JSON.stringify({
            name: "YT Schedule", short_name: "YT Schedule", display: "standalone",
            background_color: "#030712", theme_color: "#dc2626",
            icons: [{ src: "https://img.icons8.com/fluency/512/video-playlist.png", sizes: "512x512", type: "image/png" }]
        });
        const blob = new Blob([manifestStr], {type: 'application/json'});
        document.querySelector('head').insertAdjacentHTML('beforeend', `<link rel="manifest" href="${URL.createObjectURL(blob)}">`);
        
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('installAppBtn').classList.remove('hidden');
        });
        document.getElementById('installAppBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('installAppBtn').classList.add('hidden');
                deferredPrompt = null;
            }
        });

        // 2. GLOBAL VARIABLES & STATE
        let activeIdCode = null;
        let allVideosGlobal = JSON.parse(localStorage.getItem('yt_dash_local_backup')) || [];
        
        // Filter States
        let pendingFilter = 'All';
        let clearedFilter = 'All';

        // Schedule Modal State
        let targetVideoIdForSchedule = null;

        // 3. MQTT WEBSOCKET ENGINE (The 100% Guaranteed Sync)
        // We use EMQX public broker which allows free, instantaneous messaging globally.
        const mqttClient = mqtt.connect('wss://broker.emqx.io:8083/mqtt');

        mqttClient.on('connect', () => {
            if(activeIdCode) subscribeToRoom();
        });

        mqttClient.on('message', (topic, message) => {
            if(topic === `yt_schedule_room_${activeIdCode}`) {
                try {
                    const incomingData = JSON.parse(message.toString());
                    allVideosGlobal = incomingData;
                    localStorage.setItem('yt_dash_local_backup', JSON.stringify(allVideosGlobal));
                    renderVideos();
                } catch(e) { console.log("Parse Error"); }
            }
        });

        function publishToCloud() {
            if (activeIdCode && mqttClient.connected) {
                // Retain: true means the server holds the last message for the next person who connects!
                mqttClient.publish(`yt_schedule_room_${activeIdCode}`, JSON.stringify(allVideosGlobal), { retain: true });
            }
            // Always save locally immediately
            localStorage.setItem('yt_dash_local_backup', JSON.stringify(allVideosGlobal));
        }

        // 4. ID CONNECTION LOGIC
        function checkUrlForId() {
            const params = new URLSearchParams(window.location.search);
            const idParam = params.get('id');
            
            if (idParam) {
                activeIdCode = idParam.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');
                subscribeToRoom();
            } else {
                document.getElementById('idModal').classList.remove('hidden');
                renderVideos();
            }
        }

        function submitIdCode() {
            const codeInput = document.getElementById('idCodeInput').value.trim();
            if (!codeInput) return alert("Please enter an ID!");
            
            activeIdCode = codeInput.toLowerCase().replace(/[^a-z0-9_-]/g, '');
            window.history.pushState({}, '', "?id=" + activeIdCode);
            document.getElementById('idModal').classList.add('hidden');
            subscribeToRoom();
        }

        function subscribeToRoom() {
            document.getElementById('syncBadge').className = "text-xs bg-green-950/40 border border-green-800 px-3 py-1.5 rounded-full text-green-400 flex items-center gap-1.5 font-medium";
            document.getElementById('statusDot').className = "w-2 h-2 rounded-full bg-green-400 animate-pulse";
            document.getElementById('syncText').innerText = "ID: " + activeIdCode;

            if(mqttClient.connected) {
                mqttClient.subscribe(`yt_schedule_room_${activeIdCode}`);
                
                // If we have local data, push it to cloud just in case the server is empty
                setTimeout(() => {
                    if(allVideosGlobal.length > 0) publishToCloud();
                }, 1500);
            }
        }

        // 5. YOUTUBE EXTRACTOR
        function getYouTubeId(url) {
            if (!url) return null;
            let match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=|shorts\/))([\w-]{11})/);
            return (match && match[1]) ? match[1] : null;
        }

        function previewVideo(url) {
            const videoId = getYouTubeId(url);
            const previewBox = document.getElementById('formVideoPreview');
            if (videoId) {
                previewBox.innerHTML = `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>`;
                previewBox.classList.remove('hidden');
            } else {
                previewBox.innerHTML = '';
                previewBox.classList.add('hidden');
            }
        }

        // 6. FILTER & RENDER ENGINE
        function setFilter(section, channelName) {
            if(section === 'pending') {
                pendingFilter = channelName;
                updateTabUI('p-', channelName, 'bg-orange-600/20 text-orange-400');
            } else {
                clearedFilter = channelName;
                updateTabUI('c-', channelName, 'bg-green-600/20 text-green-400');
            }
            renderVideos();
        }

        function updateTabUI(prefix, activeChannel, activeClasses) {
            const tabs = ['All', 'Tech IT Master', 'Burhan Telecom'];
            tabs.forEach(tab => {
                const btn = document.getElementById(prefix + tab);
                if(tab === activeChannel) {
                    btn.className = `flex-1 py-1.5 rounded-lg transition ${activeClasses}`;
                } else {
                    btn.className = `flex-1 py-1.5 rounded-lg text-gray-500 hover:text-gray-300 transition bg-transparent`;
                }
            });
        }

        function renderVideos() {
            // Base Categorization
            const allPending = allVideosGlobal.filter(v => v.status === 'Pending' || v.status === 'SEO In Progress');
            const allCleared = allVideosGlobal.filter(v => v.status === 'Scheduled' || v.status === 'Public');

            // Apply Channel Filters
            const filteredPending = pendingFilter === 'All' ? allPending : allPending.filter(v => v.channel === pendingFilter);
            const filteredCleared = clearedFilter === 'All' ? allCleared : allCleared.filter(v => v.channel === clearedFilter);

            // Update Counts (Showing filtered count / total count)
            document.getElementById('pendingCount').innerText = `${filteredPending.length} / ${allPending.length}`;
            document.getElementById('clearCount').innerText = `${filteredCleared.length} / ${allCleared.length}`;

            const pendingList = document.getElementById('pendingList');
            const clearList = document.getElementById('clearList');

            // Render Pending
            if (filteredPending.length === 0) {
                pendingList.innerHTML = `<div class="text-center py-12 text-gray-600 text-xs border border-dashed border-gray-800 rounded-xl">No pending videos found.</div>`;
            } else {
                pendingList.innerHTML = filteredPending.map(video => createCardHTML(video)).join('');
            }

            // Render Cleared
            if (filteredCleared.length === 0) {
                clearList.innerHTML = `<div class="text-center py-12 text-gray-600 text-xs border border-dashed border-gray-800 rounded-xl">No cleared videos found.</div>`;
            } else {
                clearList.innerHTML = filteredCleared.map(video => createCardHTML(video)).join('');
            }
        }

        function createCardHTML(video) {
            let statusClass = video.status === 'Pending' ? 'bg-amber-500/10 text-amber-400 border-amber-500/20' : 
                              video.status === 'SEO In Progress' ? 'bg-purple-500/10 text-purple-400 border-purple-500/20' : 
                              video.status === 'Scheduled' ? 'bg-teal-500/10 text-teal-400 border-teal-500/20' : 'bg-green-500/10 text-green-400 border-green-500/20';
            
            let btnText = video.status === 'Pending' ? 'Start SEO' : 
                          video.status === 'SEO In Progress' ? 'Set Schedule' : 
                          video.status === 'Scheduled' ? 'Mark Public' : 'Back to Pending';

            // Button Action - If "SEO In Progress", it opens Modal instead of prompt!
            let actionClick = video.status === 'SEO In Progress' ? `openScheduleModal('${video.id}')` : `updateStatus('${video.id}', '${video.status}')`;

            const channelClass = video.channel === 'Tech IT Master' ? 'bg-orange-600/20 text-orange-400' : 'bg-blue-600/20 text-blue-400';
            
            // Format time display beautifully
            let displayTimeHTML = '';
            if(video.schedule_time) {
                const dateObj = new Date(video.schedule_time);
                const prettyDate = dateObj.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true });
                displayTimeHTML = `<p class="text-[11px] text-teal-400 font-medium mt-1">📅 Scheduled: ${prettyDate}</p>`;
            }

            const videoId = getYouTubeId(video.link);
            const embedHTML = videoId ? `<div class="w-full aspect-video rounded-lg overflow-hidden bg-black mt-2 mb-2 border border-gray-800"><iframe class="w-full h-full" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe></div>` : '';

            return `
                <div class="bg-gray-900 border border-gray-800 p-4 rounded-xl flex flex-col gap-2 shadow-md">
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-[10px] font-bold px-2 py-0.5 rounded ${channelClass}">${video.channel}</span>
                        <span class="text-[10px] px-2 py-0.5 rounded-full border ${statusClass} font-medium">${video.status}</span>
                    </div>
                    <h3 class="text-xs font-semibold text-gray-200">${video.title}</h3>
                    ${displayTimeHTML}
                    ${embedHTML}
                    
                    <div class="flex items-center justify-between border-t border-gray-800 pt-2 mt-2">
                        <div id="del-box-${video.id}" class="hidden flex items-center gap-1.5">
                            <span class="text-[10px] text-gray-400">Delete?</span>
                            <button onclick="confirmDelete('${video.id}', true)" class="px-2 py-1 bg-red-600 text-[10px] text-white rounded cursor-pointer">Yes</button>
                            <button onclick="confirmDelete('${video.id}', false)" class="px-2 py-1 bg-gray-800 text-[10px] text-gray-400 rounded border border-gray-700 cursor-pointer">No</button>
                        </div>
                        <button id="del-btn-${video.id}" onclick="showDeletePrompt('${video.id}')" class="text-[11px] text-red-500 hover:text-red-400 font-medium cursor-pointer">🗑 Delete</button>
                        
                        <button onclick="${actionClick}" class="text-[11px] px-3 py-1.5 rounded-lg bg-gray-800 border border-gray-700 hover:bg-gray-700 text-gray-200 transition font-medium cursor-pointer">
                            ${btnText}
                        </button>
                    </div>
                </div>
            `;
        }

        // 7. CORE ACTIONS (FORM SUBMIT)
        function handleFormSubmit(event) {
            event.preventDefault();
            if(!activeIdCode) return alert("Please enter an ID first to enable saving!");

            const title = document.getElementById('videoTitle').value.trim();
            const channel = document.getElementById('videoChannel').value;
            const link = document.getElementById('videoLink').value.trim();
            
            if (!title || !link) return;

            const newVideoObj = { id: 'vid_' + Date.now(), title, channel, link, status: 'Pending', schedule_time: '' };

            // Instantly add to array and render
            allVideosGlobal.unshift(newVideoObj);
            renderVideos();
            publishToCloud(); // Sync to Latif bhai instantly

            // Clear form
            document.getElementById('videoForm').reset();
            const previewBox = document.getElementById('formVideoPreview');
            previewBox.classList.add('hidden');
            previewBox.innerHTML = '';
        }

        // 8. DATE & TIME MODAL LOGIC
        function openScheduleModal(id) {
            targetVideoIdForSchedule = id;
            
            // Set today's date and current time as default
            const now = new Date();
            document.getElementById('scheduleDate').value = now.toISOString().split('T')[0];
            document.getElementById('scheduleTime').value = now.toTimeString().slice(0,5);
            
            document.getElementById('scheduleModal').classList.remove('hidden');
        }

        function closeScheduleModal() {
            document.getElementById('scheduleModal').classList.add('hidden');
            targetVideoIdForSchedule = null;
        }

        function saveSchedule() {
            const dateVal = document.getElementById('scheduleDate').value;
            const timeVal = document.getElementById('scheduleTime').value;
            
            if(!dateVal || !timeVal) return alert("Please select both Date and Time!");

            // Combine into a standard ISO format string
            const combinedDateTime = `${dateVal}T${timeVal}`;

            allVideosGlobal = allVideosGlobal.map(v => {
                if(v.id === targetVideoIdForSchedule) {
                    v.status = 'Scheduled';
                    v.schedule_time = combinedDateTime;
                }
                return v;
            });

            closeScheduleModal();
            renderVideos();
            publishToCloud();
        }

        // Standard Status Update (For other buttons)
        function updateStatus(id, currentStatus) {
            let nextStatus = 'Pending';
            if (currentStatus === 'Pending') nextStatus = 'SEO In Progress';
            else if (currentStatus === 'Scheduled') nextStatus = 'Public';
            else nextStatus = 'Pending';

            allVideosGlobal = allVideosGlobal.map(v => {
                if(v.id === id) {
                    v.status = nextStatus;
                    if(nextStatus === 'Pending') v.schedule_time = '';
                }
                return v;
            });
            renderVideos();
            publishToCloud();
        }

        function showDeletePrompt(id) {
            document.getElementById(`del-btn-${id}`).classList.add('hidden');
            document.getElementById(`del-box-${id}`).classList.remove('hidden');
        }

        function confirmDelete(id, confirm) {
            if(confirm) {
                allVideosGlobal = allVideosGlobal.filter(v => v.id !== id);
                renderVideos();
                publishToCloud();
            } else {
                document.getElementById(`del-btn-${id}`).classList.remove('hidden');
                document.getElementById(`del-box-${id}`).classList.add('hidden');
            }
        }

        // Start Engine
        checkUrlForId();
    </script>
</body>
</html>
